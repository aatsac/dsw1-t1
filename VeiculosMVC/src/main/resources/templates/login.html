            <form th:action="@{/login}" method="post">
<div th:if="${param.error}" class="alert alert-danger">
    <span th:text="#{login.error}">E-mail ou senha inválidos.</span>
</div>
<div th:if="${param.logout}" class="alert alert-success">
    <span th:text="#{logout.message}">Você saiu com sucesso.</span>
</div>

<div class="form-group">
    <label for="email" th:text="#{login.email}">E-mail</label>
    <input type="email" id="email" name="email" class="form-control"
           placeholder="" th:placeholder="#{login.email}" autofocus required/>
</div>

<div class="form-group">
    <label for="password" th:text="#{login.password}">Senha</label>
    <input type="password" id="password" name="password" class="form-control"
           placeholder="" th:placeholder="#{login.password}" required/>
</div>

<button type="submit" class="btn btn-primary btn-block" th:text="#{login.button}">Entrar</button>
