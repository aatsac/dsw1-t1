<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<body>
<footer class="layout-footer bg-light mt-5 py-3" th:fragment="rodape">
    <div class="container text-center">
        <span>&copy; 2025 Veículos MVC</span>
        <div sec:authorize="isAuthenticated()" class="mt-2">
            Usuário: <strong sec:authentication="name"></strong>
            | Papel: <strong sec:authentication="principal.usuario.papel"></strong>
        </div>
    </div>
</footer>
</body>
</html>
