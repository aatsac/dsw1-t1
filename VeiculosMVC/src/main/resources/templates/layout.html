<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" th:href="@{/image/favicon.png}" />
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{/webjars/open-iconic/font/css/open-iconic-bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <title th:text="${pageTitle}">App</title>
</head>
<body>
    <header th:replace="fragments/header :: cabecalho"></header>

    <div class="layout-main">
        <aside>
            <nav th:replace="fragments/sidebar :: nav-sidebar"></nav>
        </aside>

        <section layout:fragment="corpo">
            <!-- Conteúdo da página -->
        </section>
    </div>

    <footer th:replace="fragments/footer :: rodape"></footer>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/jquery-mask-plugin/dist/jquery.mask.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <script type="text/javascript">
        // configuração do modal e sidebar toggle
        var url = '';
        $('button[id^="btn_"]').click(function() {
            url = '/' + $(this).attr('id').split('_')[1];
        });
        $('#ok_confirm').click(function() {
            window.location.href = url;
        });
        $('.navbar-toggle').click(function() {
            $('.sidebar').toggleClass('sidebar-open');
        });
    </script>
</body>
</html>
